<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Alien Shooter - Expanded</title>
    <style>
        /* Base Retro Arcade Styling */
        body {
            background-color: #050505; color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0; overflow: hidden; display: flex;
            justify-content: center; align-items: center;
            height: 100vh; user-select: none;
        }
        #game-container {
            position: relative; width: 400px; height: 600px;
            background-color: #000; border: 2px solid #0f0; box-shadow: 0 0 15px #0f0;
        }
        canvas { display: block; }
        
        /* UI Overlays */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
            background: rgba(0, 0, 0, 0.95); text-align: center; z-index: 20; box-sizing: border-box; padding: 20px;
        }
        .screen-center { justify-content: center; }
        .hidden { display: none !important; }

        h1 { font-size: 32px; text-shadow: 0 0 10px #0f0; margin-bottom: 15px; margin-top: 0; }
        h2 { font-size: 18px; text-shadow: 0 0 5px #0f0; margin-bottom: 10px; }

        button {
            background: #111; border: 2px solid #0f0; color: #0f0;
            padding: 10px 20px; margin: 6px; font-size: 14px; font-family: inherit;
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            transition: 0.2s; width: 100%; max-width: 250px;
        }
        button:hover:not(:disabled) { background: #0f0; color: #000; box-shadow: 0 0 10px #0f0; }
        button:disabled { border-color: #444; color: #444; cursor: not-allowed; background: transparent; }

        /* HUD */
        #hud {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between; align-items: flex-start;
            font-size: 14px; font-weight: bold; text-shadow: 0 0 5px #0f0; z-index: 5; pointer-events: none;
        }
        .hud-left, .hud-right { display: flex; flex-direction: column; gap: 5px; }
        .hud-right { align-items: flex-end; }
        
        .hud-btn { pointer-events: auto; padding: 5px 10px; font-size: 12px; margin: 0; width: auto; }
        #btn-quit { border-color: #f00; color: #f00; text-shadow: none; }
        #btn-quit:hover { background: #f00; color: #000; box-shadow: 0 0 10px #f00; }
        #btn-autotoggle { border-color: #0ff; color: #0ff; }

        /* Index/Garage Menus */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; width: 100%; justify-content: center; }
        .tab-btn { width: auto; padding: 8px 12px; font-size: 12px; }
        .tab-btn.active { background: #0f0; color: #000; }
        
        #index-content {
            flex-grow: 1; width: 100%; overflow-y: auto; display: flex;
            flex-direction: column; align-items: center; gap: 10px;
        }
        
        /* Cards & Grids */
        .grid-container { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; width: 100%; }
        .card {
            border: 1px solid #0f0; padding: 10px; width: 120px;
            display: flex; flex-direction: column; align-items: center; background: #0a0a0a;
        }
        .card.mystery .sprite { filter: brightness(0); } /* Used for enemies only now */
        .card.mystery .info { color: #555; }
        .info { font-size: 11px; margin: 10px 0; line-height: 1.4; }

        /* Ship Upgrade Garage styling */
        .garage-panel { border: 1px solid #0f0; width: 100%; padding: 10px; box-sizing: border-box; text-align: left; }
        .slot-container { display: flex; gap: 5px; margin-top: 10px; }
        .slot { border: 1px dashed #0f0; padding: 5px; font-size: 10px; flex: 1; text-align: center; cursor: pointer; }
        .slot:hover { background: rgba(0,255,0,0.2); }
        .slot.locked { border-color: #444; color: #444; cursor: not-allowed; }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            display: flex; justify-content: space-between; box-sizing: border-box;
            padding: 0 20px; pointer-events: none; z-index: 10;
        }
        .control-group { pointer-events: auto; display: flex; gap: 10px; }
        .m-btn {
            width: 60px; height: 60px; border: 2px solid #0f0; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; color: #0f0; font-size: 24px;
            background: rgba(0, 255, 0, 0.1); box-shadow: inset 0 0 10px #0f0; touch-action: none;
        }
        .m-btn:active { background: rgba(0, 255, 0, 0.4); box-shadow: inset 0 0 20px #0f0; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud" class="hidden">
            <div class="hud-left">
                <div>SCORE: <span id="score">0</span></div>
                <div>WAVE: <span id="wave-display">1</span></div>
                <button id="btn-autotoggle" class="hud-btn hidden">AUTO: OFF</button>
            </div>
            <div class="hud-right">
                <div>COINS: <span id="hud-coins">0</span></div>
                <button id="btn-quit" class="hud-btn">QUIT</button>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div id="main-menu" class="screen screen-center">
            <h1>ALIEN<br>SHOOTER</h1>
            <h2 style="color: #ff0;">COINS: <span id="menu-coins">0</span></h2>
            <button id="btn-start">Start Game</button>
            <button id="btn-index">Garage & Index</button>
            <button id="btn-settings">Settings</button>
        </div>

        <div id="index-menu" class="screen hidden">
            <h1>GARAGE</h1>
            <div class="tabs">
                <button id="tab-ships" class="tab-btn active">SHIPS</button>
                <button id="tab-items" class="tab-btn">ITEMS</button>
                <button id="tab-enemies" class="tab-btn">ENEMIES</button>
            </div>
            <div id="index-content"></div>
            <button id="btn-back-index" style="margin-top: auto;">Back to Menu</button>
        </div>

        <div id="settings-menu" class="screen screen-center hidden">
            <h1>SETTINGS</h1>
            <button id="btn-toggle-mobile">Mobile Mode: OFF</button>
            <button id="btn-back-settings">Back to Menu</button>
        </div>

        <div id="game-over" class="screen screen-center hidden">
            <h1 style="color: #f00; text-shadow: 0 0 10px #f00;">GAME OVER</h1>
            <h2>FINAL SCORE: <span id="go-score">0</span></h2>
            <button id="btn-restart">Play Again</button>
            <button id="btn-menu">Main Menu</button>
        </div>

        <div id="mobile-controls" class="hidden">
            <div class="control-group">
                <div class="m-btn" id="btn-left">◀</div>
                <div class="m-btn" id="btn-right">▶</div>
            </div>
            <div class="control-group">
                <div class="m-btn" id="btn-fire">🔥</div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
