<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Alien Shooter</title>
    <style>
        /* Retro Arcade Styling */
        body {
            background-color: #111;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background-color: #000;
            border: 2px solid #0f0;
            box-shadow: 0 0 15px #0f0;
        }

        canvas {
            display: block;
        }

        /* UI Screens */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 32px;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 30px;
        }

        button {
            background: transparent;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 12px 24px;
            margin: 10px;
            font-size: 18px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            width: 250px;
        }

        button:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 10px #0f0;
        }

        /* Score Display */
        #score-display {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 5px #0f0;
            z-index: 5;
        }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 0 20px;
            pointer-events: none; /* Let clicks pass through empty space */
            z-index: 10;
        }

        .control-group {
            pointer-events: auto; /* Re-enable clicks on buttons */
            display: flex;
            gap: 10px;
        }

        .m-btn {
            width: 60px;
            height: 60px;
            border: 2px solid #0f0;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #0f0;
            font-size: 24px;
            background: rgba(0, 255, 0, 0.1);
            box-shadow: inset 0 0 10px #0f0;
            touch-action: none; /* Prevent zooming/scrolling on mobile */
        }

        .m-btn:active {
            background: rgba(0, 255, 0, 0.4);
            box-shadow: inset 0 0 20px #0f0;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-display">SCORE: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div id="main-menu" class="screen">
            <h1>ALIEN<br>SHOOTER</h1>
            <button id="btn-start">Start Game</button>
            <button id="btn-settings">Settings</button>
        </div>

        <div id="settings-menu" class="screen hidden">
            <h1>SETTINGS</h1>
            <button id="btn-toggle-mobile">Mobile Mode: OFF</button>
            <button id="btn-back">Back to Menu</button>
        </div>

        <div id="game-over" class="screen hidden">
            <h1 style="color: #f00; text-shadow: 0 0 10px #f00;">GAME OVER</h1>
            <button id="btn-restart">Play Again</button>
            <button id="btn-menu">Main Menu</button>
        </div>

        <div id="mobile-controls" class="hidden">
            <div class="control-group">
                <div class="m-btn" id="btn-left">◀</div>
                <div class="m-btn" id="btn-right">▶</div>
            </div>
            <div class="control-group">
                <div class="m-btn" id="btn-fire">🔥</div>
            </div>
        </div>
    </div>

    <script>
        // --- Setup & Context ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- UI Elements ---
        const screens = {
            main: document.getElementById('main-menu'),
            settings: document.getElementById('settings-menu'),
            gameOver: document.getElementById('game-over')
        };
        const mobileUI = document.getElementById('mobile-controls');
        const scoreEl = document.getElementById('score');
        const btnToggleMobile = document.getElementById('btn-toggle-mobile');

        // --- Game State Variables ---
        let gameState = 'menu'; // menu, playing, gameover
        let isMobileMode = false;
        let animationId;
        let score = 0;

        // Input Tracking
        const keys = { left: false, right: false, fire: false };

        // Entities
        const player = { x: 180, y: 550, width: 40, height: 20, speed: 5 };
        let bullets = [];
        let aliens = [];
        
        // Shooting Logic
        let lastShotTime = 0;
        const fireCooldown = 150; // ms between shots when holding the button

        // Alien Logic
        let alienDirection = 1;
        let alienSpeed = 1.5;
        const alienRows = 5;
        const alienCols = 8;

        // --- Event Listeners: Menus ---
        document.getElementById('btn-start').onclick = initGame;
        document.getElementById('btn-restart').onclick = initGame;
        document.getElementById('btn-menu').onclick = showMainMenu;
        
        document.getElementById('btn-settings').onclick = () => {
            screens.main.classList.add('hidden');
            screens.settings.classList.remove('hidden');
        };

        document.getElementById('btn-back').onclick = showMainMenu;

        btnToggleMobile.onclick = () => {
            isMobileMode = !isMobileMode;
            btnToggleMobile.innerText = `Mobile Mode: ${isMobileMode ? 'ON' : 'OFF'}`;
        };

        function showMainMenu() {
            gameState = 'menu';
            screens.gameOver.classList.add('hidden');
            screens.settings.classList.add('hidden');
            screens.main.classList.remove('hidden');
            mobileUI.classList.add('hidden');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // --- Event Listeners: Keyboard (A/D, Left/Right, Space) ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.left = true;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.right = true;
            if (e.key === ' ' || e.key === 'Spacebar') keys.fire = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.left = false;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.right = false;
            if (e.key === ' ' || e.key === 'Spacebar') keys.fire = false;
        });

        // --- Event Listeners: Mobile Buttons (Hold to Fire) ---
        function attachMobileButton(id, actionName) {
            const btn = document.getElementById(id);
            const press = (e) => { e.preventDefault(); keys[actionName] = true; };
            const release = (e) => { e.preventDefault(); keys[actionName] = false; };
            
            // Touch events for mobile
            btn.addEventListener('touchstart', press, { passive: false });
            btn.addEventListener('touchend', release, { passive: false });
            
            // Mouse events for testing mobile mode on desktop
            btn.addEventListener('mousedown', press);
            btn.addEventListener('mouseup', release);
            btn.addEventListener('mouseleave', release);
        }

        attachMobileButton('btn-left', 'left');
        attachMobileButton('btn-right', 'right');
        attachMobileButton('btn-fire', 'fire');

        // --- Game Logic ---
        function createAliens() {
            aliens = [];
            alienDirection = 1;
            alienSpeed = 1.5;
            for (let row = 0; row < alienRows; row++) {
                for (let col = 0; col < alienCols; col++) {
                    aliens.push({
                        x: 20 + col * 40,
                        y: 40 + row * 30,
                        width: 25,
                        height: 20
                    });
                }
            }
        }

        function initGame() {
            // Hide Menus
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            if (isMobileMode) mobileUI.classList.remove('hidden');
            
            // Reset state
            score = 0;
            scoreEl.innerText = score;
            player.x = canvas.width / 2 - player.width / 2;
            bullets = [];
            keys.left = false;
            keys.right = false;
            keys.fire = false;
            createAliens();

            gameState = 'playing';
            loop();
        }

        function gameOver() {
            gameState = 'gameover';
            cancelAnimationFrame(animationId);
            mobileUI.classList.add('hidden');
            screens.gameOver.classList.remove('hidden');
        }

        function update() {
            // Player Movement
            if (keys.left && player.x > 0) player.x -= player.speed;
            if (keys.right && player.x < canvas.width - player.width) player.x += player.speed;

            // Continuous Shooting Logic (Hold to Fire)
            if (keys.fire && Date.now() - lastShotTime > fireCooldown) {
                bullets.push({ x: player.x + player.width / 2 - 2, y: player.y, width: 4, height: 10, speed: 7 });
                lastShotTime = Date.now();
            }

            // Update Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < 0) bullets.splice(i, 1); // Remove off-screen bullets
            }

            // Update Aliens
            let hitWall = false;
            for (let alien of aliens) {
                alien.x += alienSpeed * alienDirection;
                if (alien.x <= 0 || alien.x + alien.width >= canvas.width) {
                    hitWall = true;
                }
            }

            if (hitWall) {
                alienDirection *= -1; // Reverse direction
                for (let alien of aliens) {
                    alien.y += 20; // Drop down
                    if (alien.y + alien.height >= player.y) {
                        gameOver(); // Aliens reached player
                    }
                }
            }

            // Collision Detection (Bullet vs Alien)
            for (let i = bullets.length - 1; i >= 0; i--) {
                for (let j = aliens.length - 1; j >= 0; j--) {
                    let b = bullets[i];
                    let a = aliens[j];
                    if (b && a && 
                        b.x < a.x + a.width && b.x + b.width > a.x &&
                        b.y < a.y + a.height && b.y + b.height > a.y) {
                        
                        aliens.splice(j, 1); // Kill alien
                        bullets.splice(i, 1); // Destroy bullet
                        score += 10;
                        scoreEl.innerText = score;
                        
                        // Increase difficulty when wave cleared
                        if (aliens.length === 0) {
                            alienSpeed += 0.5;
                            createAliens();
                        }
                        break;
                    }
                }
            }
        }

        function draw() {
            // Clear Screen
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Player (Spaceship)
            ctx.fillStyle = '#0f0';
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.fill();

            // Draw Bullets
            ctx.fillStyle = '#ff0';
            for (let b of bullets) {
                ctx.fillRect(b.x, b.y, b.width, b.height);
            }

            // Draw Aliens
            ctx.fillStyle = '#f00';
            for (let a of aliens) {
                ctx.fillRect(a.x, a.y, a.width, a.height);
                // Simple alien face details
                ctx.fillStyle = '#000';
                ctx.fillRect(a.x + 5, a.y + 5, 4, 4); // left eye
                ctx.fillRect(a.x + 16, a.y + 5, 4, 4); // right eye
                ctx.fillRect(a.x + 8, a.y + 12, 9, 3); // mouth
                ctx.fillStyle = '#f00'; // reset color
            }
        }

        function loop() {
            if (gameState !== 'playing') return;
            update();
            draw();
            animationId = requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
